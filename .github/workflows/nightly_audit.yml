name: VERA Nightly Audit

on:
  schedule:
    - cron: '0 0 * * *'    # midnight UTC every night
  workflow_dispatch:         # manual trigger button in GitHub UI

permissions:
  contents: write            # needed to commit results back to repo

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VERA Auditor
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/nightly_audit.py

      - name: Commit audit results back to repo
        run: |
          git config user.name  "VERA Auditor Bot"
          git config user.email "vera-auditor@github-actions"
          git add backend/db/vera.db chroma_data/ || true
          git diff --staged --quiet || git commit -m "audit: nightly run $(date +%Y-%m-%d) [skip ci]"
          git push